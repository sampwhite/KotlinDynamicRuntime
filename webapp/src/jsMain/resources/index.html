<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotlin React Webapp</title>
    <!-- The stylesheet and the icon are served straight from jsMain/resources by the dev server, from the
         origin root. AppUiPage declares the same two for the production shell, where `appui` embeds them and
         serves them under the app context root. The CSS lives in app.css, NOT inline here: both shells link
         that one file, which is what keeps them from drifting apart (see the note at the top of app.css). -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="app.css">
</head>
<body>
<div id="root"></div>
<script src="webapp.js"></script>
</body>
</html>
