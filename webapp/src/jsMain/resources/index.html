<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotlin React Webapp</title>
    <style>
        :root { color-scheme: light dark; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
            .card {
            width: min(560px, 92vw);
            padding: 32px 36px;
            border-radius: 16px;
            background: #1e293b;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .45);
        }
        h1 { margin: 0 0 4px; font-size: 1.6rem; }
        h2 { margin: 28px 0 12px; font-size: 1.05rem; color: #94a3b8; }
        .subtitle { margin: 0; color: #94a3b8; }
        .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        button {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 600;
            background: #6366f1;
            color: white;
        }
        button:hover { background: #818cf8; }
        button.ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .count { min-width: 48px; text-align: center; font-size: 1.5rem; font-weight: 700; }
        input {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .greeting { font-size: 1.2rem; margin-top: 12px; }
        .todo-title { flex: 1; min-width: 120px; }
        .todo-title.done { text-decoration: line-through; color: #94a3b8; }
        .todo-error { color: #f87171; margin-top: 12px; }
        .schema-form { width: 100%; }
        .field-label { font-weight: 600; min-width: 140px; color: #cbd5e1; }
        .field-required { color: #f87171; }
        .field-value { color: #e2e8f0; }
        .field-type { color: #64748b; font-style: italic; font-size: .85rem; }
        .json-value { flex: 1 1 100%; margin: 4px 0 0; white-space: pre; }
        .nested { margin: 4px 0 8px 16px; padding-left: 12px; border-left: 2px solid #334155; }
        .type-hint { color: #64748b; font-style: italic; margin: 2px 0; }
        .form-ok { color: #4ade80; margin-top: 12px; }
        .code {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px 14px;
            overflow-x: auto;
            font-size: .85rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="webapp.js"></script>
</body>
</html>
